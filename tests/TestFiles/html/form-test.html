<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .radio-group,
        .checkbox-group {
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>PDF Form Fields Test Document</h1>
    
    <form id="testForm">
        <!-- Text Input Fields -->
        <div class="form-section">
            <h2>Text Input Fields</h2>
            <div class="form-group">
                <label for="singleLine">Single Line Text:</label>
                <input type="text" id="singleLine" name="singleLine" placeholder="Enter single line text">
            </div>
            
            <div class="form-group">
                <label for="multiLine">Multi-line Text:</label>
                <textarea id="multiLine" name="multiLine" rows="4" placeholder="Enter multiple lines of text"></textarea>
            </div>
            
            <div class="form-group">
                <label for="password">Password Field:</label>
                <input type="password" id="password" name="password">
            </div>
        </div>

        <!-- Numeric Fields -->
        <div class="form-section">
            <h2>Numeric Fields</h2>
            <div class="form-group">
                <label for="number">Number Input:</label>
                <input type="number" id="number" name="number" min="0" max="100" step="1">
            </div>
            
            <div class="form-group">
                <label for="decimal">Decimal Number:</label>
                <input type="number" id="decimal" name="decimal" step="0.01">
            </div>
        </div>

        <!-- Select Fields -->
        <div class="form-section">
            <h2>Select Fields</h2>
            <div class="form-group">
                <label for="dropdown">Dropdown Menu:</label>
                <select id="dropdown" name="dropdown">
                    <option value="">Select an option</option>
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
            </div>

            <div class="form-group">
                <label for="multiSelect">Multi-select List:</label>
                <select id="multiSelect" name="multiSelect" multiple size="4">
                    <option value="item1">Item 1</option>
                    <option value="item2">Item 2</option>
                    <option value="item3">Item 3</option>
                    <option value="item4">Item 4</option>
                </select>
            </div>
        </div>

        <!-- Radio Buttons -->
        <div class="form-section">
            <h2>Radio Buttons</h2>
            <div class="radio-group">
                <label>Choose one option:</label>
                <div>
                    <input type="radio" id="radio1" name="radioGroup" value="radio1">
                    <label for="radio1">Radio Option 1</label>
                </div>
                <div>
                    <input type="radio" id="radio2" name="radioGroup" value="radio2">
                    <label for="radio2">Radio Option 2</label>
                </div>
                <div>
                    <input type="radio" id="radio3" name="radioGroup" value="radio3">
                    <label for="radio3">Radio Option 3</label>
                </div>
            </div>
        </div>

        <!-- Checkboxes -->
        <div class="form-section">
            <h2>Checkboxes</h2>
            <div class="checkbox-group">
                <label>Select multiple options:</label>
                <div>
                    <input type="checkbox" id="check1" name="check1" value="check1">
                    <label for="check1">Checkbox 1</label>
                </div>
                <div>
                    <input type="checkbox" id="check2" name="check2" value="check2">
                    <label for="check2">Checkbox 2</label>
                </div>
                <div>
                    <input type="checkbox" id="check3" name="check3" value="check3">
                    <label for="check3">Checkbox 3</label>
                </div>
            </div>
        </div>

        <!-- Special Fields -->
        <div class="form-section">
            <h2>Special Fields</h2>
            <div class="form-group">
                <label for="email">Email Field:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Field:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label for="date">Date Field:</label>
                <input type="date" id="date" name="date">
            </div>
        </div>

        <!-- Submit Button -->
        <div class="form-section">
            <button type="submit">Submit Form</button>
        </div>
    </form>
</body>
</html>
