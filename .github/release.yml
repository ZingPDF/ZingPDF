changelog:
  exclude:
    labels:
      - ignore-for-release
      - internal
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - performance
        - benchmarks
    - title: Docs and Website
      labels:
        - documentation
        - website
    - title: Build and Release
      labels:
        - build
        - ci
        - release
    - title: Other Changes
      labels:
        - "*"
