name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.0.0)"
        required: true
      publish_nuget:
        description: "Publish packages to NuGet"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'.Trim()

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Version must be a valid SemVer string such as 1.0.0 or 1.0.0-rc.1."
          }

          $assemblyVersion = ($version -replace '-.*$', '') + '.0'

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "assembly_version=$assemblyVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore ZingPDF.sln

      - name: Build
        run: >
          dotnet build ZingPDF.sln
          --configuration Release
          --no-restore
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test ZingPDF.sln --configuration Release --no-build

      - name: Pack core package
        run: >
          dotnet pack ZingPDF/ZingPDF.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Pack fonts package
        run: >
          dotnet pack ZingPDF.Fonts/ZingPDF.Fonts.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Pack HTML package
        run: >
          dotnet pack ZingPDF.FromHTML/ZingPDF.FromHTML.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: zingpdf-packages-${{ steps.version.outputs.version }}
          path: artifacts/packages/*
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ZingPDF v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/packages/*

      - name: Publish to NuGet
        if: ${{ github.event.inputs.publish_nuget == 'true' }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
