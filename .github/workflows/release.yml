name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/ZingPDF/**"
      - "src/ZingPDF.Fonts/**"
      - "src/ZingPDF.FromHTML/**"
      - "src/ZingPDF.GoogleFonts/**"
      - "src/ZingPDF.InheritableSourceGenerator/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/release.yml"
      - ".github/release.yml"
      - "ZingPDF.sln"
      - "Directory.Build.props"
      - "CHANGELOG.md"
      - "LICENSE.txt"
      - "docs/packages/**"
      - "docs/project/SUPPORT.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional manual release version override (for example 2.0.0)"
        required: false
        default: ""
      publish_nuget:
        description: "Publish packages to NuGet"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect release-affecting changes
        id: changes
        shell: pwsh
        run: |
          $tags = @(git tag --list "v*")
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to read git tags."
          }

          $latestTag = $tags |
            Where-Object { $_ -and $_.Trim().TrimStart('v') -match '^\d+\.\d+\.\d+$' } |
            ForEach-Object {
              [PSCustomObject]@{
                Tag = $_.Trim()
                Version = [version]$_.Trim().TrimStart('v')
              }
            } |
            Sort-Object Version -Descending |
            Select-Object -ExpandProperty Tag -First 1

          if ([string]::IsNullOrWhiteSpace($latestTag)) {
            "has_release_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $changedFiles = @(git diff --name-only "$latestTag..HEAD" -- `
            src/ZingPDF `
            src/ZingPDF.Fonts `
            src/ZingPDF.FromHTML `
            src/ZingPDF.GoogleFonts `
            src/ZingPDF.InheritableSourceGenerator `
            tests `
            scripts `
            .github/workflows/release.yml `
            .github/release.yml `
            ZingPDF.sln `
            Directory.Build.props `
            CHANGELOG.md `
            LICENSE.txt `
            docs/packages `
            docs/project/SUPPORT.md)

          if ($LASTEXITCODE -ne 0) {
            throw "Unable to inspect changed files since $latestTag."
          }

          $hasReleaseChanges = $changedFiles.Count -gt 0
          "has_release_changes=$($hasReleaseChanges.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stop when no release-affecting changes were found
        if: ${{ steps.changes.outputs.has_release_changes != 'true' }}
        shell: pwsh
        run: |
          Write-Host "No release-affecting changes found since the latest release tag."

      - name: Setup .NET
        if: ${{ steps.changes.outputs.has_release_changes == 'true' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate binary fixture checkout
        if: ${{ steps.changes.outputs.has_release_changes == 'true' }}
        shell: pwsh
        run: ./scripts/assert-binary-fixtures.ps1

      - name: Prepare release version and changelog
        if: ${{ steps.changes.outputs.has_release_changes == 'true' }}
        id: prepare
        shell: pwsh
        run: ./scripts/prepare-release.ps1 -OverrideVersion '${{ github.event.inputs.version }}'

      - name: Stop when no releasable changes were found
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release != 'true' }}
        shell: pwsh
        run: |
          Write-Host "No releasable changes found in CHANGELOG.md or commit history."

      - name: Commit release metadata
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props CHANGELOG.md
          git commit -m "chore(release): ${{ steps.prepare.outputs.version }} [skip ci][skip release]"
          git tag "${{ steps.prepare.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.prepare.outputs.tag }}"

      - name: Restore
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        run: dotnet restore ZingPDF.sln

      - name: Build
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        run: >
          dotnet build ZingPDF.sln
          --configuration Release
          --no-restore
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.prepare.outputs.version }}
          -p:AssemblyVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:FileVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.prepare.outputs.version }}

      - name: Test
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        run: dotnet test ZingPDF.sln --configuration Release --no-build

      - name: Pack core package
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        run: >
          dotnet pack src/ZingPDF/ZingPDF.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.prepare.outputs.version }}
          -p:Version=${{ steps.prepare.outputs.version }}
          -p:AssemblyVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:FileVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.prepare.outputs.version }}

      - name: Pack HTML package
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        run: >
          dotnet pack src/ZingPDF.FromHTML/ZingPDF.FromHTML.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.prepare.outputs.version }}
          -p:Version=${{ steps.prepare.outputs.version }}
          -p:AssemblyVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:FileVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.prepare.outputs.version }}

      - name: Pack Google Fonts package
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        run: >
          dotnet pack src/ZingPDF.GoogleFonts/ZingPDF.GoogleFonts.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.prepare.outputs.version }}
          -p:Version=${{ steps.prepare.outputs.version }}
          -p:AssemblyVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:FileVersion=${{ steps.prepare.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.prepare.outputs.version }}

      - name: Upload packages
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: zingpdf-packages-${{ steps.prepare.outputs.version }}
          path: artifacts/packages/*
          if-no-files-found: error

      - name: Create GitHub release
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.tag }}
          name: ZingPDF ${{ steps.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/packages/*

      - name: NuGet login (OIDC)
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' && (github.event_name == 'push' || github.event.inputs.publish_nuget == 'true') }}
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        if: ${{ steps.changes.outputs.has_release_changes == 'true' && steps.prepare.outputs.should_release == 'true' && (github.event_name == 'push' || github.event.inputs.publish_nuget == 'true') }}
        shell: pwsh
        run: |
          $packages = Get-ChildItem artifacts/packages -Filter *.nupkg | Where-Object { $_.Name -notlike '*.snupkg' }
          if ($packages.Count -eq 0) {
            throw "No NuGet packages were found to publish."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }
