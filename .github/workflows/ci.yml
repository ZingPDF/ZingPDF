name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ZingPDF.sln

      - name: Build
        run: dotnet build ZingPDF.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ZingPDF.sln --configuration Release --no-build
